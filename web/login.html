<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链溯源系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8bbef0; /* 浅色调蓝色 */
            --secondary-color: #9e7af1; /* 浅色调紫色 */
            --gradient-primary: linear-gradient(135deg, #8bbef0 0%, #9e7af1 100%);
            --shadow-medium: 0 8px 32px rgba(139, 190, 240, 0.25);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            box-shadow: var(--shadow-medium);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .login-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .form-control {
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .forgot-password {
            text-align: right;
            margin-top: 15px;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 30px;
            font-size: 1rem;
        }

        .register-link a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        .alert {
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-container">
            <img src="/images/logo.png" alt="区块链溯源系统" class="login-logo">
            <h1 class="login-title">区块链溯源系统</h1>
            <p class="text-muted text-center">请登录您的账户</p>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span id="loginAlertMessage"></span>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label for="loginUsername" class="form-label">
                    <i class="fas fa-user me-2"></i>用户名
                </label>
                <input type="text" class="form-control" id="loginUsername" placeholder="请输入用户名" required>
            </div>
            <div class="mb-3">
                <label for="loginPassword" class="form-label">
                    <i class="fas fa-lock me-2"></i>密码
                </label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" required>
                    <i class="fas fa-eye toggle-password" id="toggleLoginPassword"></i>
                </div>
            </div>
            <div class="forgot-password">
                <a href="#" id="forgotPasswordLink">忘记密码?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>登录
            </button>
        </form>

        <div class="register-link">
            还没有账户? <a href="register.html">立即注册</a>
        </div>

        <div class="loading-indicator" id="loginLoading">
            <div class="spinner"></div>
            <p>正在登录...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 服务器配置 - 根据实际服务器地址修改
        const serverURL = "http://111.230.7.188:8090";

        // API端点 - 与后端保持一致
        const endpoints = {
            login: "/api/auth/login",       // 登录端点
            validateToken: "/api/auth/validate" // 令牌验证端点
        };

        // 认证相关函数
        const authManager = {
            // 检查用户是否已登录
            isLoggedIn() {
                const user = localStorage.getItem('currentUser');
                const token = localStorage.getItem('authToken');
                return !!user && !!token;
            },

            // 获取当前用户信息
            getCurrentUser() {
                try {
                    return JSON.parse(localStorage.getItem('currentUser') || '{}');
                } catch (e) {
                    return null;
                }
            },

            // 获取认证令牌
            getAuthToken() {
                return localStorage.getItem('authToken');
            },

            // 验证令牌有效性
            async validateToken() {
                if (!this.getAuthToken()) {
                    return false;
                }

                try {
                    const response = await fetch(serverURL + endpoints.validateToken, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${this.getAuthToken()}`
                        }
                    });

                    return response.ok;
                } catch (error) {
                    console.error('令牌验证失败:', error);
                    return false;
                }
            },

            // 执行登录
            async login(username, password) {
                try {
                    const response = await fetch(serverURL + endpoints.login, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    if (!response.ok) {
                        const error = await response.json().catch(() => ({ message: '登录失败' }));
                        throw new Error(error.message || '登录失败，请检查用户名和密码');
                    }

                    const data = await response.json();

                    // 保存用户信息和令牌
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userLoggedIn', 'true');

                    return data;
                } catch (error) {
                    console.error('登录错误:', error);
                    throw error;
                }
            },

            // 退出登录
            logout() {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('authToken');
                localStorage.removeItem('userLoggedIn');
                window.location.href = 'login.html';
            }
        };

        // 检查是否已登录，如果已登录则跳转到主页
        if (authManager.isLoggedIn()) {
            // 验证令牌有效性
            authManager.validateToken().then(valid => {
                if (valid) {
                    window.location.href = 'index.html';
                } else {
                    authManager.logout();
                }
            });
        }

        // 密码显示/隐藏切换
        const toggleLoginPassword = document.getElementById('toggleLoginPassword');
        const loginPassword = document.getElementById('loginPassword');

        toggleLoginPassword.addEventListener('click', function () {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // 登录表单提交处理
        const loginForm = document.getElementById('loginForm');
        const loginAlert = document.getElementById('loginAlert');
        const loginAlertMessage = document.getElementById('loginAlertMessage');
        const loginLoading = document.getElementById('loginLoading');

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            // 简单的前端验证
            if (!username || !password) {
                showAlert('请填写完整的登录信息');
                return;
            }

            // 显示加载状态
            loginForm.style.display = 'none';
            loginLoading.style.display = 'block';

            try {
                // 调用登录API
                await authManager.login(username, password);
                // 登录成功，重定向到主页
                window.location.href = 'index.html';
            } catch (error) {
                // 登录失败
                loginForm.style.display = 'block';
                loginLoading.style.display = 'none';
                showAlert(error.message);
            }
        });

        // 显示错误提示
        function showAlert(message) {
            loginAlertMessage.textContent = message;
            loginAlert.classList.remove('d-none');
            // 3秒后自动隐藏
            setTimeout(function () {
                loginAlert.classList.add('d-none');
            }, 3000);
        }

        // 忘记密码链接
        document.getElementById('forgotPasswordLink').addEventListener('click', function (e) {
            e.preventDefault();
            showAlert('请联系系统管理员重置密码');
        });
    </script>
</body>

</html>

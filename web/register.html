<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链溯源系统 - 注册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8bbef0; /* 浅色调蓝色 */
            --secondary-color: #9e7af1; /* 浅色调紫色 */
            --gradient-primary: linear-gradient(135deg, #8bbef0 0%, #9e7af1 100%);
            --shadow-medium: 0 8px 32px rgba(139, 190, 240, 0.25);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            box-shadow: var(--shadow-medium);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .register-logo {
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .register-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .form-control,
        .form-select {
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            border-radius: 50px;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            background-color: #f1f3f5;
        }

        .alert {
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
        }

        .form-text {
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .login-link {
            text-align: center;
            margin-top: 30px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .role-description {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
            padding-left: 5px;
        }

        /* 新增：错误详情样式 */
        .error-details {
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 8px;
            background-color: rgba(220, 53, 69, 0.1);
            border-radius: 8px;
            display: none;
        }
    </style>
</head>

<body>
    <!-- 注册卡片容器 -->
    <div class="register-card">
        <div class="logo-container">
            <img src="https://picsum.photos/200/200" alt="区块链溯源系统logo" class="register-logo">
            <h1 class="register-title">创建账户</h1>
            <p class="text-muted">加入我们的区块链溯源系统</p>
        </div>

        <!-- 错误提示框 -->
        <div id="registerAlert" class="alert alert-danger d-none">
            <span id="registerAlertMessage"></span>
            <div id="errorDetails" class="error-details"></div>
        </div>

        <!-- 注册表单 -->
        <form id="registerForm">
            <div class="form-group">
                <label for="registerUsername" class="form-label">用户名</label>
                <input type="text" id="registerUsername" class="form-control" placeholder="请设置用户名" required>
                <div class="form-text">用户名长度应在4-20个字符之间</div>
            </div>

            <div class="form-group password-wrapper">
                <label for="registerPassword" class="form-label">密码</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="请设置密码" required>
                <i class="fas fa-eye toggle-password" id="toggleRegisterPassword"></i>
                <div class="form-text">密码长度应至少8个字符，包含字母和数字</div>
            </div>

            <div class="form-group password-wrapper">
                <label for="confirmPassword" class="form-label">确认密码</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="请再次输入密码" required>
                <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
            </div>

            <div class="form-group">
                <label for="registerRole" class="form-label">身份选择</label>
                <select id="registerRole" class="form-select" required>
                    <option value="">请选择您的身份</option>
                    <option value="producer">生产者</option>
                    <option value="processor1">一级加工者</option>
                    <option value="processor2">二级加工者</option>
                    <option value="distributor">分销商</option>
                    <option value="retailer">零售商</option>
                    <option value="admin">管理员</option>
                </select>
                <div id="roleDescription" class="role-description">请选择适合您的身份类型</div>
            </div>

            <button type="submit" class="btn btn-primary mt-3">
                <i class="fas fa-user-plus me-2"></i>注册账户
            </button>
        </form>

        <!-- 加载状态 -->
        <div id="registerLoading" class="loading-indicator">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">注册中...</span>
            </div>
            <p class="mt-2">正在创建您的账户，请稍候...</p>
        </div>

        <!-- 登录链接 -->
        <div class="login-link">
            <p>已有账户？<a href="login.html" id="loginLink">立即登录</a></p>
        </div>
    </div>

    <!-- 引入JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 角色描述信息
        const roleDescriptions = {
            "": "请选择适合您的身份类型",
            "producer": "负责批次注册和原材料登记（级别0,1）",
            "processor1": "负责初级加工和质量检测（级别2,3）",
            "processor2": "负责深度加工处理（级别4,5）",
            "distributor": "负责物流运输环节（级别6）",
            "retailer": "负责零售终端环节（级别7）",
            "admin": "系统管理员，拥有所有操作权限"
        };

        // 角色选择变化时显示相应描述
        document.getElementById('registerRole').addEventListener('change', function () {
            const role = this.value;
            document.getElementById('roleDescription').textContent = roleDescriptions[role] || "";
        });

        // 密码显示/隐藏切换
        document.querySelectorAll('.toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function () {
                const passwordInput = this.previousElementSibling;
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // 切换图标
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // 表单提交处理
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // 获取表单值
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('registerRole').value;

            // 验证表单
            let isValid = true;
            let errorMessage = "";

            if (username.length < 4 || username.length > 20) {
                isValid = false;
                errorMessage = "用户名长度应在4-20个字符之间";
            } else if (password.length < 8) {
                isValid = false;
                errorMessage = "密码长度应至少8个字符";
            } else if (password !== confirmPassword) {
                isValid = false;
                errorMessage = "两次输入的密码不一致";
            } else if (!role) {
                isValid = false;
                errorMessage = "请选择您的身份";
            }

            // 显示错误信息
            const alertElement = document.getElementById('registerAlert');
            const alertMessageElement = document.getElementById('registerAlertMessage');
            const errorDetailsElement = document.getElementById('errorDetails');

            // 重置错误信息
            errorDetailsElement.textContent = "";
            errorDetailsElement.style.display = "none";

            if (!isValid) {
                alertMessageElement.textContent = errorMessage;
                alertElement.classList.remove('d-none');
                return;
            }

            // 隐藏错误信息
            alertElement.classList.add('d-none');

            // 显示加载状态
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('registerLoading').style.display = 'block';

            // 准备注册数据（根据后端API要求）
            const registerData = {
                username: username,
                password: password,
                role: role,
                email: username + "@example.com",
                fullName: username
            };

            // 发送注册请求 - 优化跨域配置
            fetch('http://111.230.7.188:8090/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(registerData),
                // 完整跨域配置
                credentials: 'include',
                mode: 'cors',
                cache: 'no-cache',
                redirect: 'follow',
                referrerPolicy: 'no-referrer-when-downgrade'
            })
                .then(response => {
                    console.log('响应状态码:', response.status);

                    // 记录响应头信息用于调试
                    const responseHeaders = {};
                    response.headers.forEach((value, key) => {
                        responseHeaders[key] = value;
                    });
                    console.log('响应头信息:', responseHeaders);

                    if (!response.ok) {
                        return response.text().then(text => {
                            try {
                                // 尝试解析JSON错误信息
                                const data = JSON.parse(text);
                                throw new Error(data.message || `注册失败: ${response.statusText}`);
                            } catch {
                                // 非JSON响应处理
                                throw new Error(`注册失败: HTTP状态码 ${response.status}`);
                            }
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('注册成功:', data);
                    alert('注册成功，请登录');
                    window.location.href = 'login.html';
                })
                .catch(error => {
                    console.error('注册错误详情:', error);

                    // 显示错误信息
                    document.getElementById('registerLoading').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'block';

                    alertMessageElement.textContent = error.message;
                    alertElement.classList.remove('d-none');

                    // 显示详细错误信息（仅在开发环境）
                    errorDetailsElement.textContent = `详细信息: ${error.stack || error.toString()}`;
                    errorDetailsElement.style.display = "block";

                    // 特别处理CORS错误
                    if (error.message.includes('CORS') || error.message.includes('跨域')) {
                        errorDetailsElement.textContent += "\n可能是跨域配置问题，请检查服务器CORS设置是否允许http://localhost:5500";
                    }
                });
        });
    </script>
</body>

</html>
